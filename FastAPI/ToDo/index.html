<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>API 可视化测试台 (含注册功能)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;}
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"], input[type="password"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; transition: 0.2s; white-space: nowrap;}
        .btn-add { background: #1890ff; } .btn-add:hover { background: #096dd9; }
        .btn-register { background: #52c41a; } .btn-register:hover { background: #389e0d; }
        .btn-delete { background: #ff4d4f; padding: 5px 10px; font-size: 12px; }
        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .todo-item:last-child { border-bottom: none; }
        .completed span { text-decoration: line-through; color: #999; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-green { background-color: #52c41a; } .dot-red { background-color: #ff4d4f; }
        .auth-section { background: #e6f7ff; padding: 15px; border-radius: 8px; border: 1px solid #91d5ff;}
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 FastAPI 前端测试台</h2>
        <p>API 状态: <span class="status-dot dot-red" id="api-status"></span><span id="status-text">未连接</span></p>
    </div>

    <div class="card auth-section">
        <h3 style="margin-top: 0;">👤 步骤 1：新用户注册测试</h3>
        <div class="input-group">
            <input type="text" id="reg-username" placeholder="输入你想注册的账号">
            <input type="password" id="reg-password" placeholder="输入密码">
            <button class="btn-register" onclick="registerUser()">发送注册请求</button>
        </div>
        <p id="reg-msg" style="font-size: 14px; margin: 0; font-weight: bold;"></p>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">📝 步骤 2：待办事项大厅 (公共可见)</h3>
        <div class="input-group">
            <input type="text" id="new-todo-title" placeholder="输入新的待办事项...">
            <button class="btn-add" onclick="createTodo()">发送 POST</button>
        </div>
        <ul class="todo-list" id="list-container"></ul>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000";

        window.onload = fetchTodos;

        // 🌟 新增：请求后端的注册接口
        async function registerUser() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const msgBox = document.getElementById('reg-msg');

            if (!username || !password) {
                msgBox.innerText = "⚠️ 用户名和密码不能为空！";
                msgBox.style.color = "#d48806";
                return;
            }

            msgBox.innerText = "注册中...";
            msgBox.style.color = "gray";

            try {
                // 对应你的 /auth/register 接口
                const res = await fetch(`${BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                const data = await res.json();

                if (res.ok) {
                    msgBox.innerText = `✅ ${data.message}`;
                    msgBox.style.color = "green";
                } else {
                    // 如果用户名重复，拦截显示的错误信息在这里
                    msgBox.innerText = `❌ 失败: ${data.detail}`;
                    msgBox.style.color = "red";
                }
            } catch (err) {
                msgBox.innerText = "❌ 网络错误，检查你的 FastAPI 和 auth 路由是否正常启动！";
                msgBox.style.color = "red";
            }
        }

        // --- 下面是之前的增删改查逻辑，无需修改 ---
        async function fetchTodos() {
            try {
                const res = await fetch(`${BASE_URL}/todos`);
                if (!res.ok) throw new Error("网络错误");
                const data = await res.json();
                document.getElementById('api-status').className = 'status-dot dot-green';
                document.getElementById('status-text').innerText = '已连接到 FastAPI';
                renderList(data);
            } catch (err) {
                document.getElementById('api-status').className = 'status-dot dot-red';
                document.getElementById('status-text').innerText = '连接失败，请检查 CORS 和 Uvicorn';
            }
        }

        async function createTodo() {
            const titleInput = document.getElementById('new-todo-title');
            if (!titleInput.value) return;
            await fetch(`${BASE_URL}/todos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleInput.value, completed: false })
            });
            titleInput.value = '';
            fetchTodos();
        }

        async function deleteTodo(id) {
            await fetch(`${BASE_URL}/todos/${id}`, { method: 'DELETE' });
            fetchTodos();
        }

        function renderList(todos) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div>
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} disabled>
                        <span>ID:${todo.id} - ${todo.title}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">发送 DELETE</button>
                `;
                container.appendChild(li);
            });
        }
    </script>
</body>
</html>
