<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>API 可视化测试台</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-add { background: #1890ff; } .btn-add:hover { background: #096dd9; }
        .btn-delete { background: #ff4d4f; padding: 5px 10px; font-size: 12px; }
        .todo-list { list-style: none; padding: 0; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .todo-item:last-child { border-bottom: none; }
        .completed span { text-decoration: line-through; color: #999; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-green { background-color: #52c41a; } .dot-red { background-color: #ff4d4f; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 FastAPI 前端测试台</h2>
        <p>API 状态: <span class="status-dot dot-red" id="api-status"></span><span id="status-text">未连接</span></p>

        <div class="input-group">
            <input type="text" id="new-todo-title" placeholder="输入新的待办事项，然后回车测试 POST 请求...">
            <button class="btn-add" onclick="createTodo()">发送 POST</button>
        </div>

        <ul class="todo-list" id="list-container">
            </ul>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000/todos";

        // 页面加载时自动获取数据 (测试 GET)
        window.onload = fetchTodos;

        async function fetchTodos() {
            try {
                const res = await fetch(BASE_URL);
                if (!res.ok) throw new Error("网络错误");
                const data = await res.json();

                // 更新连接状态
                document.getElementById('api-status').className = 'status-dot dot-green';
                document.getElementById('status-text').innerText = '已连接到 FastAPI';

                renderList(data);
            } catch (err) {
                document.getElementById('api-status').className = 'status-dot dot-red';
                document.getElementById('status-text').innerText = '连接失败，请检查 CORS 和 Uvicorn';
            }
        }

        // 创建新事项 (测试 POST)
        async function createTodo() {
            const titleInput = document.getElementById('new-todo-title');
            if (!titleInput.value) return alert("写点东西吧！");

            await fetch(BASE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleInput.value, completed: false })
            });
            titleInput.value = ''; // 清空输入框
            fetchTodos(); // 重新拉取列表
        }

        // 删除事项 (测试 DELETE)
        async function deleteTodo(id) {
            await fetch(`${BASE_URL}/${id}`, { method: 'DELETE' });
            fetchTodos(); // 重新拉取列表
        }

        // 渲染 HTML
        function renderList(todos) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div>
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} disabled>
                        <span>ID:${todo.id} - ${todo.title}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">发送 DELETE</button>
                `;
                container.appendChild(li);
            });
        }
    </script>
</body>
</html>
